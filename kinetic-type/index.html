<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Type Page Transition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Page 1 -->
        <div class="page page-1 active">
            <div class="content">
                <h1>Page One</h1>
                <p>Welcome to the kinetic type demonstration.</p>
                <button class="next-btn" data-target="page-2">Next Page →</button>
            </div>
        </div>

        <!-- Page 2 -->
        <div class="page page-2">
            <div class="content">
                <h1>Page Two</h1>
                <p>Experience smooth transitions with animated typography.</p>
                <button class="next-btn" data-target="page-3">Next Page →</button>
                <button class="prev-btn" data-target="page-1">← Previous</button>
            </div>
        </div>

        <!-- Page 3 -->
        <div class="page page-3">
            <div class="content">
                <h1>Page Three</h1>
                <p>The final destination of this transition journey.</p>
                <button class="prev-btn" data-target="page-2">← Previous</button>
            </div>
        </div>

        <!-- Overlay for transition -->
        <div class="transition-overlay">
            <div class="letters-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
